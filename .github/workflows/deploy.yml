name: Deploy do GitHub Pages

# Buduje stronę (Vite) i publikuje ją na GitHub Pages przy każdym pushu do main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Uprawnienia wymagane przez GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Tylko jeden deploy naraz; nowy push anuluje poprzedni w toku.
concurrency:
  group: pages
  cancel-in-progress: true

# Wymusza uruchamianie akcji JS na Node 24 — usuwa ostrzeżenie o wycofaniu Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Zainstaluj zależności
        run: npm ci

      - name: Zbuduj stronę
        run: npm run build
        env:
          # Klucz Web3Forms (leady na e-mail) — ustaw w repo: Settings → Secrets and
          # variables → Actions → Variables → VITE_WEB3FORMS_KEY. Bezpieczny do ujawnienia.
          VITE_WEB3FORMS_KEY: ${{ vars.VITE_WEB3FORMS_KEY }}
          # Webhook n8n/Make (docelowo). Pusty = pomijany.
          VITE_LEAD_WEBHOOK_URL: ${{ vars.VITE_LEAD_WEBHOOK_URL }}

      - name: Skonfiguruj Pages
        uses: actions/configure-pages@v5

      - name: Wyślij artefakt (folder dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Opublikuj na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
