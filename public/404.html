<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Nie znaleziono strony (404) | Kamil Bronisz</title>
    <link rel="icon" type="image/svg+xml" href="/kamil-bronisz-oze/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(60% 60% at 50% 0%, #131c2b 0%, #0a1018 70%);
        color: rgba(255, 255, 255, 0.85);
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      .badge {
        display: inline-grid;
        place-items: center;
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #ecd28a, #bb8718);
        color: #0a1018;
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.4rem;
        margin-bottom: 1.5rem;
      }
      h1 { font-family: 'Sora', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem); color: #fff; }
      p { margin-top: 0.75rem; color: rgba(255, 255, 255, 0.6); }
      a.btn {
        display: inline-block;
        margin-top: 1.75rem;
        padding: 0.85rem 1.6rem;
        border-radius: 999px;
        background: linear-gradient(90deg, #ecd28a, #d4a017);
        color: #0a1018;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">KB</span>
      <h1>404</h1>
      <p>Ups! Tej strony nie ma. Wróćmy do energii, która się opłaca.</p>
      <a class="btn" href="/kamil-bronisz-oze/">← Wróć na stronę główną</a>
    </main>
  </body>
</html>
